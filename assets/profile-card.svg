<svg width="1000" height="360" viewBox="0 0 1000 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ethan C. Lu profile card</title>
  <desc id="desc">Healthcare IT, AI workflow systems, data integration, and local-first applications.</desc>
  <defs>
