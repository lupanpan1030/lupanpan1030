<svg width="1000" height="500" viewBox="0 0 1000 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ethan Chen Lu profile card</title>
  <desc id="desc">Local-first AI systems, healthcare IT, data workflows, Locus, IdeaSenseAI, and portfolio work.</desc>
  <defs>
    <linearGradient id="bg" x1="60" y1="52" x2="940" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09111F"/>
      <stop offset="0.5" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#17120F"/>
    </linearGradient>
    <linearGradient id="rule" x1="110" y1="114" x2="890" y2="114" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58A6FF"/>
      <stop offset="0.45" stop-color="#303B4D"/>
      <stop offset="1" stop-color="#F0883E"/>
    </linearGradient>
    <linearGradient id="accent" x1="660" y1="150" x2="858" y2="348" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58A6FF"/>
      <stop offset="0.52" stop-color="#F0883E"/>
      <stop offset="1" stop-color="#3FB950"/>
    </linearGradient>
    <radialGradient id="warm" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(850 86) rotate(127) scale(315 520)">
      <stop stop-color="#F0883E" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#F0883E" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="28" y="18" width="944" height="464" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="30" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect x="54" y="42" width="892" height="416" rx="30" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="54.5" y="42.5" width="891" height="415" rx="29.5" stroke="#303B4D"/>
  <rect x="54" y="42" width="892" height="416" rx="30" fill="url(#warm)"/>

  <path d="M110 114H890" stroke="url(#rule)" stroke-width="2"/>
  <path d="M110 386H890" stroke="#263447"/>
  <path d="M110 386H318" stroke="#58A6FF" stroke-width="2.5"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="110" y="104" fill="#8B949E" font-size="15" font-weight="800" letter-spacing="2.6">LOCAL-FIRST AI SYSTEMS</text>
  </g>

  <text x="108" y="178" fill="#F0F6FC" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="54" font-weight="850" letter-spacing="-1.8">
    Ethan Chen Lu
  </text>
  <text x="112" y="220" fill="#C9D1D9" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="650">
