  </text>
  <text x="112" y="263" fill="#8B949E" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="560">
    I build software where AI agents, data, and product decisions stay visible,
  </text>
  <text x="112" y="289" fill="#8B949E" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="560">
    structured, and auditable.
  </text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" font-weight="800">
    <rect x="112" y="326" width="118" height="34" rx="17" fill="#111827" stroke="#263447"/>
    <text x="132" y="348" fill="#58A6FF">TypeScript</text>
    <rect x="242" y="326" width="94" height="34" rx="17" fill="#111827" stroke="#263447"/>
    <text x="262" y="348" fill="#F0883E">Electron</text>
    <rect x="348" y="326" width="92" height="34" rx="17" fill="#111827" stroke="#263447"/>
    <text x="370" y="348" fill="#3FB950">Python</text>
  </g>

  <g>
    <circle cx="774" cy="185" r="84" stroke="#223047"/>
    <circle cx="774" cy="185" r="51" stroke="#58A6FF" stroke-opacity="0.44"/>
    <circle cx="774" cy="185" r="8" fill="#F0883E"/>
    <path d="M774 88V282M677 185H871" stroke="#1F6FEB" stroke-opacity="0.34"/>
    <path d="M716 127L832 243M832 127L716 243" stroke="#3FB950" stroke-opacity="0.22"/>
    <path d="M701 315H847" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
